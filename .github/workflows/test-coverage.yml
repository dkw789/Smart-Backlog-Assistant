name: Test Coverage and Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[test,dev]"
    
    - name: Run tests with coverage
      run: pytest --cov=src --cov-report=xml --cov-report=html --cov-report=term-missing --cov-fail-under=50
    
    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: true
        token: ${{ secrets.CODECOV_TOKEN }}
    
    - name: Archive coverage HTML report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report-${{ matrix.python-version }}
        path: htmlcov/
    
    - name: Run linting
      run: |
        flake8 src tests --max-line-length=100 --ignore=E203,W503
        black --check src tests
        isort --check-only src tests
    
    - name: Run type checking
      run: |
        mypy src --ignore-missing-imports --no-strict-optional

  docker-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Build Docker image
      run: docker build -t smart-backlog-assistant:test .
    
    - name: Run tests in Docker
      run: |
        docker run --rm \
          -v $(pwd)/tests:/app/tests \
          -e PYTHONPATH=/app/src \
          smart-backlog-assistant:test \
          uv run pytest tests/ --cov=src --cov-fail-under=50
