[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    --cov=src
    --cov-report=html:htmlcov
    --cov-report=term-missing
    --cov-report=xml
    --cov-fail-under=80
    --strict-markers
    --disable-warnings
    -v
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    ai_dependent: Tests that require AI API keys
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
